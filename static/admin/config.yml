backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: src/assets
public_folder: ../../assets/

collections:
  - name: "pages"
    label: "Pages"
    description: >
      Where you can edit pages.
    # folder: "src/markdowns/home"
    editor:
      preview: false
    files:
      - file: "src/markdowns/home/index.md"
        name: "index"
        label: "Home"
        fields:
          - {
              label: "Template Key",
              name: "templateKey",
              widget: "hidden",
              default: "home",
            }
          - { label: "Title", name: "title", widget: "hidden", required: false }
          - {
              label: "About",
              name: "about",
              widget: "object",
              fields:
                [
                  { label: "Name", name: "name", widget: "string" },
                  { label: "Title", name: "title", widget: "string" },
                  { label: "Body", name: "body", widget: "markdown", required: false },
                ],
            }
          - {
              label: "Overview",
              name: "overview",
              widget: "object",
              fields: [{ label: "Body", name: "body", widget: "markdown" }],
            }
          - label: "Experiences"
            name: "experiences"
            widget: "list"
            fields:
              - {
                  label: "Hide Stacks",
                  name: "hideStacks",
                  widget: "boolean",
                  default: false,
                  hint: "Toggle to hide the tech stack badges for this experience",
                }
              - { label: "Date", name: "date", widget: "string" }
              - {
                  label: "Company",
                  name: "company",
                  widget: "object",
                  fields:
                    [
                      { label: "Name", name: "name", widget: "string" },
                      {
                        label: "Link",
                        name: "link",
                        widget: "string",
                        required: false,
                      },
                    ],
                }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "markdown" }
              - label: "Stacks"
                name: "stacks"
                widget: "list"
                fields:
                  - {
                      label: "Stack Name",
                      name: "stack name",
                      widget: "string",
                    }
              - label: "Contributions"
                name: "contributions"
                widget: "list"
                required: false
                fields:
                  - {
                      label: "Contribution",
                      name: "contribution",
                      widget: "string",
                    }
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - {
                      label: "Skill Name",
                      name: "skill_name",
                      widget: "string",
                    }
          - label: "Projects"
            name: "projects"
            widget: "list"
            fields:
              - {
                  label: "Hidden",
                  name: "hidden",
                  widget: "boolean",
                  default: false,
                  hint: "Toggle to hide this project from the website",
                }
              - {
                  label: "Featured",
                  name: "featured",
                  widget: "boolean",
                  default: true,
                  hint: "Toggle to feature this project on the website",
                }
              - {
                  label: "Hide Stacks",
                  name: "hideStacks",
                  widget: "boolean",
                  default: false,
                  hint: "Toggle to hide the tech stack badges for this project",
                }
              - {
                  label: "Image",
                  name: image,
                  widget: image,
                  choose_url: false,
                }
              - { label: "Title", name: "title", widget: "string" }
              - {
                  label: "Link",
                  name: "link",
                  widget: "string",
                  required: false,
                }
              - { label: "Body", name: "body", widget: "markdown" }
              - label: "Stacks"
                name: "stacks"
                widget: "list"
                fields:
                  - {
                      label: "Stack Name",
                      name: "stack name",
                      widget: "string",
                    }
          - label: "Socials"
            name: "socials"
            widget: "list"
            fields:
              - {
                  label: "Image",
                  name: image,
                  widget: image,
                  choose_url: false,
                }
              - { label: "Title", name: "title", widget: "string" }
              - {
                  label: "Link",
                  name: "link",
                  widget: "string",
                  required: false,
                }
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Featured", name: "featured", widget: "boolean", default: true, hint: "Toggle to feature this testimonial" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Date", name: "date", widget: "string" }
              - { label: "Photo URL", name: "photo", widget: "string", required: false }
              - { label: "Portfolio Link", name: "portfolio_link", widget: "string", required: false }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              [
                { label: "Name", name: "name", widget: "hidden", default: "" },
                { label: "Body", name: "body", widget: "markdown" },
              ]
